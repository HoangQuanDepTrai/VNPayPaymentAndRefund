# === C?U HĚNH DATABASE H2 (B?N CHU?N) ===
# DB_CLOSE_DELAY=-1 gi? cho DB không b? xóa khi Hibernate ?óng session
spring.datasource.url=jdbc:h2:mem:vnpaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Důng 'update' ?? gi? data ho?c 'create-drop' ?? reset s?ch m?i l?n restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console ?? ông soi DB: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true