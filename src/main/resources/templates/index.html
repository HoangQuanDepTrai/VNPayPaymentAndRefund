<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Premium Cinema | Lunar Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-200 font-['Inter'] min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-slate-800 p-10 rounded-3xl border border-slate-700 shadow-2xl">
    <header class="text-center mb-10">
        <h1 class="text-2xl font-bold tracking-widest text-sky-400 uppercase">Lunar Cinema</h1>
        <p class="text-[10px] text-slate-500 mt-2">CHỌN GHẾ ĐỂ TIẾP TỤC (D3 ĐÃ ĐẶT - TEST REFUND)</p>
    </header>

    <form th:action="@{/pay}" method="post" class="space-y-6">
        <div class="space-y-2">
            <label class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">Họ và tên khách hàng</label>
            <input type="text" name="name" placeholder="Nhập tên khách hàng..." required
                   class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sky-300 outline-none focus:border-sky-500 transition-all">
        </div>

        <div class="grid grid-cols-4 gap-4 py-4 border-y border-slate-700">
            <div th:each="seat : ${seats}" class="relative">
                <input type="radio"
                       th:id="${seat.id}"
                       name="seatId"
                       th:value="${seat.id}"
                       th:disabled="${seat.booked && seat.id != 'D3'}"
                       class="peer hidden" required>

                <label th:for="${seat.id}"
                       class="flex items-center justify-center h-12 rounded-lg border border-slate-700 bg-slate-900 cursor-pointer peer-checked:bg-sky-600 peer-disabled:opacity-20 peer-disabled:cursor-not-allowed transition-all hover:border-sky-500">
                    <span th:text="${seat.id}" class="text-xs font-bold"></span>
                </label>

                <span th:if="${seat.id == 'D3'}"
                      class="absolute -top-1 -right-1 bg-amber-500 text-[8px] px-1 rounded font-bold shadow-sm text-slate-900">HOT</span>

                <span th:if="${seat.booked && seat.id != 'D3'}"
                      class="absolute -top-1 -right-1 bg-red-600 text-[8px] px-1 rounded font-bold shadow-sm">SOLD</span>
            </div>

            <div th:if="${#lists.isEmpty(seats)}" class="col-span-4 text-center text-red-400 text-xs py-4">
                ⚠️ Không tìm thấy ghế trong hệ thống!
            </div>
        </div>

        <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl">
            <span class="text-xs text-slate-500 uppercase font-bold">Tổng tiền:</span>
            <div class="flex items-center space-x-1">
                <input type="number" name="amount" value="50000" min="1000" class="bg-transparent text-xl font-bold text-white w-20 text-right outline-none">
                <span class="text-xs text-slate-500">VND</span>
            </div>
        </div>

        <button type="submit" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">
            Xác nhận thanh toán
        </button>
    </form>

    <div th:if="${param.error}" class="mt-4 p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-[10px] text-center uppercase tracking-widest">
        Ghế này vừa bị húp mất rồi ông giáo ơi!
    </div>
</div>
</body>
</html>
