<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lunar Booking | Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-['Lexend'] min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-sky-400">LUNAR CINEMA</h1>
        <p class="text-slate-400 text-sm mt-1">Hệ thống đặt vé vjp pro của chị Lunar</p>
    </header>

    <form action="/pay" method="post" class="space-y-6">
        <div>
            <label class="block text-xs uppercase text-slate-500 mb-2">Họ và tên</label>
            <input type="text" name="name" value="Võ Ngọc Thảo Ly" readonly
                   class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sky-300">
        </div>

        <div class="grid grid-cols-4 gap-3">
            <div th:each="entry : ${seats}">
                <input type="radio" th:id="${entry.key}" name="seatId" th:value="${entry.key}"
                       th:disabled="${entry.value}" class="hidden peer" required>
                <label th:for="${entry.key}" class="flex items-center justify-center h-12 rounded-lg border-2 border-slate-700 bg-slate-900 cursor-pointer transition-all
                        peer-checked:bg-sky-500 peer-checked:border-sky-300 peer-disabled:opacity-20 peer-disabled:grayscale">
                    <span th:text="${entry.key}" class="font-bold text-sm"></span>
                </label>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center">
            <span class="text-slate-400 text-sm">Tổng thanh toán:</span>
            <span class="text-xl font-bold text-sky-400">50,000đ</span>
            <input type="hidden" name="amount" value="50000">
        </div>

        <button type="submit"
                class="w-full py-4 bg-sky-500 hover:bg-sky-400 rounded-xl font-bold shadow-lg shadow-sky-500/20 active:scale-95 transition-all">
            THANH TOÁN NGAY (VNPay)
        </button>
    </form>
</div>
</body>
</html>
